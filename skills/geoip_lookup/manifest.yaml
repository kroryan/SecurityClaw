name: geoip_lookup
routing_group: geo_enrichment
orchestration_role: direct
capability_groups:
  - geo_enrichment
  - direct_entity_lookup
requires_explicit_entity: true
required_entities:
  - ip
answer_types:
  - IP geolocation lookup
  - country and city enrichment for an IP
artifact_outputs:
  - ip
  - geo
  - country
  - subdivision
  - city
  - timezone
description: >
  Resolves IP geolocation through a local MaxMind GeoLite2-City MMDB when
  available, or IPinfo Lite as a country/continent/ASN fallback.

can_answer:
  - "IP geolocation lookup"
  - "what country/city/state an IP is from"
  - "GeoIP enrichment"
  - "location lookup for an IP address"
  - "maintain local MaxMind GeoIP database"

cannot_answer:
  - "threat reputation"
  - "log searching"
  - "traffic"
  - "timeline reconstruction"
  - "OpenSearch field discovery"
  - "behavioral baseline analysis"

priority_keywords:
  - "geoip"
  - "geolocate"
  - "geolocation"
  - "where is this ip"
  - "what country"
  - "what city"
  - "state"
  - "country"
  - "city"
  - "location"
  - "maxmind"

min_prior_context: 0

response_formatter: skills.geoip_lookup.hooks:format_response

returns:
  - ip
  - geo
  - country
  - subdivision
  - city
  - timezone
  - db maintenance status

conditional_recovery:
  - position: back
    when_any_question_patterns:
      - regex: '\b(?:country|countries|origin|origins|where\s+from|geolocation|geoip)\b'
    requires_extracted_entities:
      - ips
    skip_if_result_exists_for_skills:
      - geoip_lookup

required_env_vars:
  - name: MAXMIND_LICENSE_KEY
    description: "MaxMind License Key (optional when IPINFO_TOKEN is configured)"
    env_key: MAXMIND_LICENSE_KEY
    optional: true
    alternatives: [MAXMIND_LICENSE_KEY, IPINFO_TOKEN]
    is_secret: true
  - name: IPINFO_TOKEN
    description: "IPinfo Lite token (optional fallback when MaxMind is unavailable)"
    env_key: IPINFO_TOKEN
    optional: true
    alternatives: [MAXMIND_LICENSE_KEY, IPINFO_TOKEN]
    is_secret: true
